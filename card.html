<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card — What is? / What if?</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="project-page">

    <header class="site-header">
      <a href="#" class="site-header__home" id="header-logo">WHAT IS? / WHAT IF? / <span id="header-project-name"></span></a>
      <nav class="site-nav">
        <a class="nav-link" id="nav-gallery" href="#">Gallery</a>
        <a class="nav-link" id="nav-creative" href="#">Creative</a>
        <a class="nav-link" id="nav-analysis" href="#">Analysis</a>
        <a class="nav-link" id="nav-print" href="#">Print</a>
        <div class="nav-more">
          <button class="nav-link nav-more__trigger" id="nav-more-btn" aria-expanded="false">···</button>
          <div class="nav-more__menu" id="nav-more-menu">
            <a class="nav-more__item" href="about.html">About</a>
            <a class="nav-more__item" href="#">Settings</a>
            <button class="nav-more__item" id="btn-export-json">↓ Export cards</button>
            <label class="nav-more__item" id="nav-import-label">
              ↑ Import cards
              <input type="file" id="input-import-json" accept=".json" hidden />
            </label>
            <div class="nav-more__status" id="import-status"></div>
            <a class="nav-more__item" href="index.html">All projects</a>
          </div>
        </div>
      </nav>
    </header>

    <div class="page-wrapper">

      <!-- ── Card page: top bar, card+arrows, annotations ── -->
      <div class="card-page">

        <!-- Top action bar — back + position on left, print/edit/delete on right -->
        <div class="card-view__actions">
          <div class="card-view__actions-left">
            <a href="index.html" class="card-view__back" id="btn-back">← Back</a>
            <span class="card-view__position" id="card-position"></span>
            <a href="#" class="btn-new-card btn-new-card--what-is" id="btn-new-what-is" hidden>+ New what is</a>
            <a href="#" class="btn-new-card btn-new-card--what-if" id="btn-new-what-if" hidden>+ New what if</a>
          </div>
          <div class="card-view__actions-right">
            <a href="#" class="btn-card-print" id="btn-print">Print</a>
            <button class="btn-card-share" id="btn-share">Share</button>
            <a href="#" class="btn-card-edit" id="btn-edit">Edit</a>
            <button class="btn-card-delete" id="btn-delete">Delete</button>
          </div>
        </div>

        <!-- Card with side navigation arrows -->
        <div class="card-view">
          <button class="card-view__arrow" id="btn-prev" aria-label="Previous card"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg></button>
          <div class="card-view__stage">
            <div id="card-stage">
              <!-- Card rendered here by card.js -->
            </div>
          </div>
          <button class="card-view__arrow" id="btn-next" aria-label="Next card"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>

        <!-- ── Card links: shown only when links exist, rendered by card.js ── -->
        <div class="card-links" id="card-links" hidden></div>

        <!-- ── Annotations: two-column, aligned to card columns ── -->
        <section class="card-annotations">

          <!-- Left column: reaction buttons (aligns with text side of card) -->
          <div class="annotations__reactions-col">
            <div class="annotations__reactions" id="reactions-list">
              <!-- Reaction buttons built by card.js -->
            </div>
          </div>

          <!-- Right column: comment thread (aligns with image side of card) -->
          <div class="annotations__comments-col">
            <div class="annotations__comments-list" id="comments-list"></div>
            <form class="annotations__comment-form" id="comment-form">
              <input class="annotations__name-input"
                     id="input-user-name" type="text"
                     placeholder="Your name…" autocomplete="name" />
              <textarea class="annotations__comment-textarea"
                        id="input-comment-text"
                        placeholder="Write a comment…" rows="2"></textarea>
              <button class="annotations__action-btn" type="submit">Post</button>
            </form>
          </div>

        </section>

      </div><!-- /card-page -->

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data.js"></script>
    <script src="js/db.js"></script>
    <script src="js/card.js"></script>
  </body>
</html>
