<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New card — What is? / What if?</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>

    <div class="page-wrapper create-layout">

      <!-- Left sidebar -->
      <aside class="sidebar">

        <div class="sidebar__header">
          <a href="#" class="sidebar__back" id="back-link">← Back</a>
          <h2 class="sidebar__title" id="sidebar-title">New card</h2>
        </div>

        <div class="sidebar__section">
          <label class="sidebar__label">Card type</label>
          <div class="sidebar__toggle">
            <button class="sidebar-btn sidebar-btn--active" data-type="what-is">What Is?</button>
            <button class="sidebar-btn" data-type="what-if">What If?</button>
          </div>
        </div>

        <div class="sidebar__section">
          <label class="sidebar__label">Author</label>
          <input class="sidebar__input" id="input-author" type="text" placeholder="Your name" />
        </div>

        <div class="sidebar__section">
          <label class="sidebar__label">Tags</label>
          <div class="sidebar__tag-list" id="sidebar-tag-list"></div>
          <div class="sidebar__tag-field">
            <div class="sidebar__tag-add">
              <input class="sidebar__input" id="input-tag" type="text" placeholder="Add a tag…" autocomplete="off" />
              <button class="sidebar-btn" id="btn-add-tag">Add</button>
            </div>
            <div class="tag-suggestions" id="tag-suggestions" hidden></div>
          </div>
        </div>

        <div class="sidebar__section">
          <label class="sidebar__label">References / source</label>
          <textarea class="sidebar__input sidebar__textarea" id="input-references" placeholder="Source, link, or citation…" rows="3"></textarea>
        </div>

        <!-- Link to What Is? cards — optional, only visible for What If? type -->
        <div class="sidebar__section sidebar__section--link" id="section-link" hidden>
          <label class="sidebar__label">Linked to <span class="sidebar__label-optional">(optional)</span></label>
          <div class="sidebar__linked-chips" id="linked-chips"></div>
          <input class="sidebar__input" id="input-link-search"
                 type="text" placeholder="Search What Is? cards…" autocomplete="off" />
          <div class="link-suggestions" id="link-suggestions" hidden></div>
        </div>

        <div class="sidebar__footer">
          <button class="btn-publish" id="btn-publish">Publish</button>
          <a href="#" class="sidebar__cancel" id="sidebar-cancel">Cancel</a>
          <button class="btn-delete-card" id="btn-delete-card" hidden>Delete card</button>
        </div>

      </aside>

      <!-- Main: editable card -->
      <main class="create-main">
        <div class="card-wrapper" id="edit-card-wrapper">
          <div class="card" id="edit-card">

            <header class="card__header">
              <span class="card__header-project" id="edit-project"></span>
              <span class="card__header-type" id="edit-type-label">WHAT IS?</span>
              <span class="card__header-date" id="edit-date"></span>
            </header>

            <div class="card__body">
              <div class="card__content">
                <h1 class="card__title"
                    contenteditable="true"
                    id="edit-title"
                    data-placeholder="Title"
                    spellcheck="true"></h1>
                <p class="card__description"
                   contenteditable="true"
                   id="edit-body"
                   data-placeholder="Write your description here…"
                   spellcheck="true"></p>
                <div class="card__tags" id="edit-tags"></div>
              </div>

              <div class="card__image-col" id="drop-zone">
                <div class="card__image-area" id="edit-image-area">
                  <span class="card__image-placeholder">Drag image here</span>
                </div>
                <span class="card__author" id="edit-author"></span>
              </div>
              <div class="card__references">
                <span class="card__references-text" id="edit-references"></span>
              </div>
            </div>

          </div>
        </div>
      </main>

    </div>

    <script src="js/data.js"></script>
    <script src="js/create.js"></script>
  </body>
</html>
