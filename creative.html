<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creative — What is? / What if?</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="project-page creative-page">

    <header class="site-header">
      <a href="#" class="site-header__home" id="header-logo">WHAT IS? / WHAT IF? / <span id="header-project-name"></span></a>
      <nav class="site-nav">
        <a class="nav-link" id="nav-gallery" href="#">Gallery</a>
        <a class="nav-link" id="nav-creative" href="#">Creative</a>
        <a class="nav-link" id="nav-analysis" href="#">Analysis</a>
        <a class="nav-link" id="nav-print" href="#">Print</a>
        <div class="nav-more">
          <button class="nav-link nav-more__trigger" id="nav-more-btn" aria-expanded="false">···</button>
          <div class="nav-more__menu" id="nav-more-menu">
            <a class="nav-more__item" href="about.html">About</a>
            <a class="nav-more__item" href="#">Settings</a>
            <button class="nav-more__item" id="btn-export-json" style="display:none">↓ Export</button>
            <label class="nav-more__item" id="nav-import-label" style="display:none">↑ Import</label>
            <div class="nav-more__status" id="import-status" style="display:none"></div>
            <a class="nav-more__item" href="index.html">All projects</a>
          </div>
        </div>
      </nav>
    </header>

    <div class="page-wrapper">

      <!-- Session dashboard bar -->
      <div class="creative-bar">
        <div class="creative-bar__group">
          <span class="creative-bar__label">Technique</span>
          <div class="creative-bar__modes" id="mode-btns">
            <button class="filter-btn filter-btn--active" data-mode="constraint">Constraint</button>
            <button class="filter-btn" data-mode="provoke">Provocation</button>
            <button class="filter-btn" data-mode="random-word">Random word</button>
            <button class="filter-btn" data-mode="combine">Combine two</button>
          </div>
        </div>
        <div class="creative-bar__group">
          <span class="creative-bar__label">Focus</span>
          <select id="theme-focus" class="creative-focus" aria-label="Limit observations to a theme"></select>
        </div>
        <div class="creative-bar__group creative-bar__group--right">
          <span class="creative-session" id="session-stat"></span>
        </div>
      </div>

      <!-- What this technique does -->
      <p class="creative-status" id="creative-status"></p>

      <!-- Spark stage: observation + prompt / second observation -->
      <div class="spark-stage" id="spark-stage">
        <p class="spark-empty" id="spark-empty" hidden>No What is? observations in this project yet.</p>
      </div>

      <!-- Controls -->
      <div class="spark-controls" id="spark-controls" hidden>
        <button class="spark-lock" id="btn-lock-left" aria-pressed="false">Lock observation</button>
        <button class="spark-shuffle" id="btn-shuffle">↺ Shuffle <span class="spark-shuffle__key">Space</span></button>
        <button class="spark-lock" id="btn-lock-right" aria-pressed="false">Lock prompt</button>
      </div>

      <!-- CTA -->
      <div class="creative-cta">
        <a href="#" class="btn-generate" id="btn-generate" hidden>Turn into a What if? →</a>
        <p class="creative-cta__hint">Your observation is pre-linked to the new card, and the prompt seeds its body.</p>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data.js"></script>
    <script src="js/db.js"></script>
    <script src="js/creative.js"></script>
  </body>
</html>
