<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogue — What is? / What if?</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="catalogue-page">

    <!-- Controls bar -->
    <div class="print-controls" id="print-controls">
      <a class="print-controls__back" id="cat-back" href="#">← Back</a>
      <span class="print-controls__project" id="cat-project-name"></span>
      <a class="print-controls__mode" id="cards-link" href="#">← Cards (1 per page)</a>
      <div class="print-controls__filters" id="density-btns">
        <button class="filter-btn filter-btn--active" data-density="3x4">3 × 4</button>
        <button class="filter-btn" data-density="2x3">2 × 3</button>
      </div>
      <span class="print-controls__count" id="cat-count"></span>
      <button class="btn-print-now" id="btn-export-book">Export book PDF</button>
    </div>

    <!-- Progress overlay -->
    <div class="pdf-progress" id="pdf-progress" hidden>
      <div class="pdf-progress__box">
        <p class="pdf-progress__label" id="pdf-progress-label">Preparing…</p>
        <div class="pdf-progress__track">
          <div class="pdf-progress__bar" id="pdf-progress-bar"></div>
        </div>
        <button class="pdf-progress__cancel" id="pdf-cancel">Cancel</button>
      </div>
    </div>

    <!-- Book preview (portrait A4 pages: cover + 3×4 grids by theme) -->
    <div class="book" id="book">
      <p class="book-empty" id="book-empty" hidden>No cards in this project yet.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/db.js"></script>
    <script src="js/catalogue.js"></script>
  </body>
</html>
